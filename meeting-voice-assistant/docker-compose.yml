version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ASR_ENGINE=sensevoice
      - SENSEVOICE_MODE=local
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务 (开发模式)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  # SenseVoice 本地服务 (可选)
  # sensevoice-local:
  #   image: sensevoice/sensevoice:latest
  #   ports:
  #     - "8080:8000"
